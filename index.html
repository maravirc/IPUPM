<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Himnario IPU Moyobamba</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#0d47a1">

    <link rel="icon" href="icons/icon-192.png">
</head>
<body>

<!-- ========================== -->
<!-- BOTÓN DE CONFIGURACIÓN -->
<!-- ========================== -->

<div class="header-actions">
    <button id="btnConfiguracion" class="btn-engranaje" title="Configuración">
        ⚙️
    </button>
</div>

<!-- ========================== -->
<!-- MENÚ DE CONFIGURACIÓN -->
<!-- ========================== -->

<div id="menuConfiguracion" class="menu-configuracion" style="display:none;">
    <div class="menu-content">
        <div class="menu-header">
            <h3>⚙️ Configuración</h3>
            <button id="cerrarMenu" class="btn-cerrar-menu">✕</button>
        </div>
        <div class="menu-body">
            
            <!-- Opción Actualizar -->
            <div class="opcion-menu" id="opcionActualizar">
                <span class="icono-opcion">📲</span>
                <div class="texto-opcion">
                    <strong>Actualizar App</strong>
                    <small>Buscar e instalar nueva versión</small>
                </div>
                <button class="btn-actualizar-menu" id="btnActualizarDesdeMenu">
                    Actualizar
                </button>
            </div>
            
            <!-- Opción Versión -->
            <div class="opcion-menu" id="opcionVersion">
                <span class="icono-opcion">ℹ️</span>
                <div class="texto-opcion">
                    <strong>Versión</strong>
                    <small id="versionActual">v1.0.0</small>
                </div>
            </div>
            
            <!-- Opción Favoritos -->
            <div class="opcion-menu" id="opcionFavoritos">
                <span class="icono-opcion">⭐</span>
                <div class="texto-opcion">
                    <strong>Favoritos</strong>
                    <small id="contadorFavoritos">0 himnos</small>
                </div>
            </div>
            
            <!-- Opción Limpiar Caché -->
            <div class="opcion-menu" id="opcionCache">
                <span class="icono-opcion">🗑️</span>
                <div class="texto-opcion">
                    <strong>Limpiar Caché</strong>
                    <small>Eliminar datos temporales</small>
                </div>
                <button class="btn-actualizar-menu btn-cache" id="btnLimpiarCache">
                    Limpiar
                </button>
            </div>
            
        </div>
    </div>
</div>

<!-- ========================== -->
<!-- CONTENIDO PRINCIPAL -->
<!-- ========================== -->

<div class="topbar">
    <header>
        <h1>📖 Himnario IPUP</h1>
        <p>Iglesia Pentecostal Unida - Moyobamba</p>
    </header>

    <section class="busqueda">
        <input
            type="text"
            id="buscar"
            placeholder="Buscar himno o coro..."
        >
    </section>

    <nav class="menu">
        <button id="btnHimnos">📖 Himnos</button>
        <button id="btnCoros">🎵 Coros</button>
        <button id="btnFavoritos">⭐ Favoritos</button>
        <button id="btnInstalar" style="display:none;">
            📲 Instalar App
        </button>
    </nav>
</div>

<main>
    <div id="lista">
        <!-- Aquí aparecerán los himnos -->
    </div>
</main>

<footer>
    <p>© 2026 Iglesia Pentecostal Unida - Moyobamba</p>
</footer>

<script src="script.js"></script>

<script>
if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>

</body>
</html>
