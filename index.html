<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Himnario IPUP Moyobamba</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#0d47a1">

    <link rel="icon" href="icons/icon-192.png">
</head>
<body>

<!-- ========================== 
<!-- BOTÓN DE CIERRE -->
<!-- ========================== 

<div class="header-actions">
    <button id="btnCerrarApp" class="btn-engranaje" title="Cerrar aplicación">
        <span class="x-azul">✕</span>
    </button>
</div>
-->
<!-- ========================== -->
<!-- CONTENIDO PRINCIPAL -->
<!-- ========================== -->

<div class="topbar">
    <header>
        <h1>📖 Himnario IPUP</h1>
        <p id="subtitulo">Iglesia Pentecostal Unida - Moyobamba</p>
    </header>

    <section class="busqueda" style="display: flex; gap: 10px; align-items: center; padding: 15px;">
        <input
            type="text"
            id="buscar"
            placeholder="Buscar himno o coro..."
            style="flex: 1;"
        >
        <!-- 🔥 BOTÓN DE MICRÓFONO -->
        <button id="btnVoz" style="
            background: #0d47a1;
            border: none;
            color: white;
            font-size: 24px;
            padding: 10px 14px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        ">
            🎤
        </button>
    </section>

    <nav class="menu">
        <button id="btnHimnos">📖 Himnos</button>
        <button id="btnCoros">🎵 Adoración y Alabanzas</button>
        <button id="btnFavoritos">⭐ Favoritos</button>
        <button id="btnInstalar" style="display:none;">
            📲 Instalar App
        </button>
    </nav>
</div>

<main>
    <!-- Título de la sección actual -->
    <div id="tituloSeccion" class="titulo-seccion">
        <h2>📖 Himnos</h2>
    </div>
    
    <div id="lista">
        <!-- Aquí aparecerán los himnos -->
    </div>
</main>

<footer>
    <p>© 2026 Iglesia Pentecostal Unida - Moyobamba</p>
</footer>

<script src="script.js"></script>

<script>
if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>

</body>
</html>
