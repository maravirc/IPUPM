<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Himnario IPU Moyobamba</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#0d47a1">

    <link rel="icon" href="icons/icon-192.png">
</head>
<body>

<!-- ========================== -->
<!-- SOLO BOTÓN DE CIERRE -->
<!-- ========================== -->

<div class="header-actions">
    <button id="btnCerrarApp" class="btn-engranaje" title="Cerrar aplicación">
        ⚙️
    </button>
</div>

<!-- ========================== -->
<!-- CONTENIDO PRINCIPAL -->
<!-- ========================== -->

<div class="topbar">
    <header>
        <h1>📖 Himnario IPUP</h1>
        <p>Iglesia Pentecostal Unida - Moyobamba</p>
    </header>

    <section class="busqueda">
        <input
            type="text"
            id="buscar"
            placeholder="Buscar himno o coro..."
        >
    </section>

    <nav class="menu">
        <button id="btnHimnos">📖 Himnos</button>
        <button id="btnCoros">🎵 Adoracion y Alabanzas</button>
        <button id="btnFavoritos">⭐ Favoritos</button>
        <button id="btnInstalar" style="display:none;">
            📲 Instalar App
        </button>
    </nav>
</div>

<main>
    <div id="lista">
        <!-- Aquí aparecerán los himnos -->
    </div>
</main>

<footer>
    <p>© 2026 Iglesia Pentecostal Unida - Moyobamba</p>
</footer>

<script src="script.js"></script>

<script>
if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>

</body>
</html>
