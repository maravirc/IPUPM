<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Himnario IPUP Moyobamba</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#0d47a1">

    <link rel="icon" href="icons/icon-192.png">
</head>
<body>

<!-- ========================== 
<!-- BOTÓN DE CIERRE -->
<!-- ========================== 

<div class="header-actions">
    <button id="btnCerrarApp" class="btn-engranaje" title="Cerrar aplicación">
        <span class="x-azul">✕</span>
    </button>
</div>
-->
<!-- ========================== -->
<!-- CONTENIDO PRINCIPAL -->
<!-- ========================== -->

<div class="topbar">
    <header style="padding: 10px 20px;">
        <h1 style="font-size: 22px;">📖 Himnario IPUP</h1>
        <p id="subtitulo" style="font-size: 13px; margin-top: 2px;">Iglesia Pentecostal Unida - Moyobamba</p>
    </header>

    <section class="busqueda" style="display: flex; align-items: center; padding: 5px 11px; position: relative;">
        <!-- Contenedor con borde completo -->
        <div style="
            display: flex;
            flex: 1;
            border: 2px solid #106dd6;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            height: 44px;
            box-sizing: border-box;
        ">
            <input
                type="text"
                id="buscar"
                placeholder="Buscar por numero o nombre..."
                style="
                    flex: 1;
                    border: none;
                    padding: 0 10px;
                    outline: none;
                    height: 100%;
                    font-size: 16px;
                    box-sizing: border-box;
                    background: transparent;
                "
            >

            <!-- Botón de limpiar (✕) -->  
            <button id="btnLimpiar" style="
            position: absolute;
            right: 57px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            background: rgba(13, 71, 161, 1);
            border: 2px solid rgba(13, 71, 161, 1);
            border-radius: 50%;
            color: #fff;
            font-size: 22px;
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        ">
            ✕
        </button>
            
            <!-- Botón de voz -->
            <button id="btnVoz" style="
                background: #0d47a1;
                border: none;
                color: white;
                font-size: 20px;
                cursor: pointer;
                transition: all 0.3s ease;
                width: 36px;
                height: 36px;
                border-radius: 50%;  
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                margin: 2px;                  /* ← Separación del borde */
            ">
                🎙️
            </button>
        </div>
    </section>
    
    <!-- Indicador de voz -->
    <div id="indicadorVoz" style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 50px; font-size: 16px; z-index: 9999; backdrop-filter: blur(10px); box-shadow: 0 4px 30px rgba(0,0,0,0.3); animation: pulseVoz 1s ease-in-out infinite;">
        🎤 Escuchando...
    </div>
    
    <style>
        @keyframes pulseVoz {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
    </style>

    <nav class="menu">
        <button id="btnHimnos">📖 Himnos</button>
        <button id="btnCoros">🎵 Adoración y Alabanzas</button>
        <button id="btnFavoritos">⭐ Favoritos</button>
        <button id="btnInstalar" style="display:none;">
            📲 Instalar App
        </button>
    </nav>
</div>

<main>
    <!-- Título de la sección actual -->
    <div id="tituloSeccion" class="titulo-seccion">
        <h2>📖 Himnos</h2>
    </div>
    
    <div id="lista">
        <!-- Aquí aparecerán los himnos -->
    </div>
</main>

<footer>
    <p>© 2026 Iglesia Pentecostal Unida - Moyobamba</p>
</footer>

<div id="updateBanner">

    <div>
        <strong>� Nueva actualización disponible</strong>
        <p class="versiones"></p>
    </div>

    <button id="btnActualizarApp">
        Actualizar
    </button>

</div>

<script src="script.js"></script>

<script>
if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>

</body>
</html>
